apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-server
  namespace: gps
  labels:
    app: mcp-server
    app.kubernetes.io/part-of: gps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-server
  template:
    metadata:
      labels:
        app: mcp-server
    spec:
      imagePullSecrets:
        - name: quay-pull-secret
      containers:
        - name: mcp-server
          image: python:3.11-slim
          command: ["uv", "run", "mcp_server.py", "--http", "--port", "8000"]
          ports:
            - containerPort: 8000
              name: http
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /app/data
              readOnly: true
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: gps-data
