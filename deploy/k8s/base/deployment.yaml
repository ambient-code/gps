apiVersion: apps/v1
kind: Deployment
metadata:
  name: gps-mcp-server
  namespace: gps-mcp-server
  labels:
    app: gps-mcp-server
    app.kubernetes.io/part-of: gps
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  selector:
    matchLabels:
      app: gps-mcp-server
  template:
    metadata:
      labels:
        app: gps-mcp-server
    spec:
      imagePullSecrets:
        - name: quay-pull-secret
      containers:
        - name: gps-mcp-server
          image: python:3.11-slim
          command: ["uv", "run", "mcp_server.py", "--http", "--port", "8000"]
          ports:
            - containerPort: 8000
              name: http
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
